<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 700px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 85vh;
        }

        .chat-header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 20px 25px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h1 {
            font-size: 1.3em;
            font-weight: 600;
        }

        .chat-header .subtitle {
            font-size: 0.8em;
            opacity: 0.9;
            margin-top: 3px;
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.25);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.75em;
            font-weight: 500;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95em;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .message.assistant .message-content {
            background: #f0f2f5;
            color: #1a1a2e;
            border-bottom-left-radius: 4px;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .chat-input-area {
            padding: 15px 20px;
            border-top: 1px solid #e8e8e8;
            display: flex;
            gap: 10px;
            background: #fafafa;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 0.95em;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input-area input:focus {
            border-color: #4facfe;
        }

        .chat-input-area input:disabled {
            background: #f5f5f5;
        }

        .btn-send {
            padding: 12px 24px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-send:hover:not(:disabled) {
            transform: scale(1.05);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-reset {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 15px;
            font-size: 0.75em;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.35);
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 12px 16px;
            background: #f0f2f5;
            border-radius: 18px;
            width: fit-content;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        .welcome-message {
            text-align: center;
            color: #888;
            padding: 40px 20px;
        }

        .welcome-message h2 {
            font-size: 1.2em;
            margin-bottom: 10px;
            color: #555;
        }

        .welcome-message p {
            font-size: 0.9em;
            line-height: 1.6;
        }

        .divider {
            text-align: center;
            color: #aaa;
            font-size: 0.8em;
            padding: 10px;
            position: relative;
        }

        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: #ddd;
        }

        .divider::before { left: 5%; }
        .divider::after { right: 5%; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div>
                <h1>🏥 Health Assistant</h1>
                <div class="subtitle">Powered by AI — Tell us your symptoms</div>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <div class="status-badge" id="statusBadge">Symptom Collection</div>
                <button class="btn-reset" onclick="resetChat()">New Chat</button>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <h2>👋 Welcome to Health Assistant</h2>
                <p>Hi, I'm Disha. I'm here to help you find the right doctor or hospital.<br>
                Start by telling me about your symptoms, and I'll guide you through the process.</p>
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="Describe your symptoms..."
                   onkeypress="if(event.key === 'Enter') sendMessage()" autofocus>
            <button class="btn-send" id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let sessionId = null;
        let isLoading = false;

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message || isLoading) return;

            input.value = '';
            addMessage('user', message);
            setLoading(true);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sessionId: sessionId,
                        message: message
                    })
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }

                const data = await response.json();
                sessionId = data.sessionId;
                updateStatus(data.state);
                removeTypingIndicator();
                addMessage('assistant', data.reply);
            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', '⚠️ Sorry, something went wrong. Please try again.');
                console.error('Error:', error);
            } finally {
                setLoading(false);
            }
        }

        function addMessage(role, content) {
            const chatMessages = document.getElementById('chatMessages');

            // Remove welcome message if present
            const welcome = chatMessages.querySelector('.welcome-message');
            if (welcome) welcome.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);

            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function setLoading(loading) {
            isLoading = loading;
            document.getElementById('sendBtn').disabled = loading;
            document.getElementById('messageInput').disabled = loading;

            if (loading) {
                showTypingIndicator();
            }

            if (!loading) {
                document.getElementById('messageInput').focus();
            }
        }

        function showTypingIndicator() {
            const chatMessages = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '🤖';

            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';

            typingDiv.appendChild(avatar);
            typingDiv.appendChild(indicator);
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function updateStatus(state) {
            const badge = document.getElementById('statusBadge');
            switch (state) {
                case 'COLLECTING_SYMPTOMS':
                    badge.textContent = 'Symptom Collection';
                    break;
                case 'FINDING_DOCTORS':
                    badge.textContent = '🔍 Finding Doctors';
                    break;
                case 'COMPLETE':
                    badge.textContent = '✅ Complete';
                    break;
            }
        }

        async function resetChat() {
            if (sessionId) {
                try {
                    await fetch(`/api/chat/${sessionId}`, { method: 'DELETE' });
                } catch (e) {
                    console.error('Error resetting session:', e);
                }
            }
            sessionId = null;
            document.getElementById('chatMessages').innerHTML = `
                <div class="welcome-message">
                    <h2>👋 Welcome to Health Assistant</h2>
                    <p>Hi, I'm Disha. I'm here to help you find the right doctor or hospital.<br>
                    Start by telling me about your symptoms, and I'll guide you through the process.</p>
                </div>
            `;
            document.getElementById('statusBadge').textContent = 'Symptom Collection';
            document.getElementById('messageInput').focus();
        }
    </script>
</body>
</html>
